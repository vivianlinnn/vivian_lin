    <div class="purple" id="top">

        <div class="header">
            <h1>Vivian Lin</h1>
            <h2>Third Year Data Science Major + Business Economics Minor @ UC San Diego</h2>
        </div>
    
    </div>
    
    

    <div class="scrapbook_container">
        <svg id="circle" viewBox="0 0 100 100" aria-hidden="true">
            <circle cx="50" cy="50" r="48" fill="#bbb8b3" stroke="white" stroke-width="0.5" />
          </svg>

          <img src="images/vivian.jpeg" alt="My Photo" id="photo">
        <img src="images/photo_frame.png" alt="Green Scrap Book Base" id="frame">

        
        <img src="images/top_flower.png" alt="Flower" id="top-flower" class="flower">
        <img src="images/middle_flower.png" alt="Flower" id="middle-flower" class="flower">
        <img src="images/bottom_flower.png" alt="Flower" id="bottom-flower" class="flower">

        <img src="images/ribbon.png" alt="Ribbon" id="ribbon">

    </div>

    <div class="link_to_external">
        <img src="images/linkedin.png" alt="Linkedin" class="external_links" id="linkedin">
        <img src="images/github.png" alt="Github" class="external_links" id="github">
        <img src="images/resume.png" alt="Resume" class="external_links" id="resume">
    </div>


    <div class="component" id="experiences">
        <h2>Experiences</h2>
    </div>

    <div class="component" id="project">
        <h2>Projects</h2>

        <div class="projects">

        </div>
    </div>
    <div class="component" id="contact">
        <h2>Contact</h2>
      
        <form action="https://formspree.io/f/xeejqpwj" method="POST">
            <div class="textbox">
          
              <div class="left-side">
                <label for="name">Name
                  <input id="name" name="name" type="text" class="single" required>
                </label>
          
                <label for="email">Email
                  <input id="email" name="email" type="email" class="single" required>
                </label>
          
                <label for="phone">Phone Number
                  <input id="phone" name="phone" type="tel" class="single">
                </label>
              </div>
          
              <div class="right-side">
                <label for="subject">Subject
                  <input id="subject" name="subject" type="text" class="single">
                </label>
          
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
              </div>
          
            </div>
          
            <button type="submit">Send</button>
          </form>
          


        </div>

    </div>
      

    
    <script src="transition.js"></script>
    
</body>
</html>
